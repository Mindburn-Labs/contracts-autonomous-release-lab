name: Untrusted PR administrator

on:
  pull_request_target:

permissions:
  contents: write
  actions: write

jobs:
  execute-untrusted-head:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - run: bash ./untrusted-release.sh
